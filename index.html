<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeatherX Pro</title>

<style>

/* ================= RESET ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Segoe UI',sans-serif;
}

/* ================= BODY ================= */
body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#000,#0a0a0a,#121212);
  color:#fff;
  transition:0.5s;
}

/* 🌞 DAY BACKGROUND */
body.day{
  background:linear-gradient(135deg,#1e3c72,#2a5298);
}

/* 🌙 NIGHT BACKGROUND */
body.night{
  background:linear-gradient(135deg,#000,#0a0a0a,#121212);
}

/* ================= CONTAINER ================= */
.container{
  width:95%;
  max-width:950px;
  padding:30px;
  border-radius:20px;
  text-align:center;

  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.08);

  box-shadow:
    0 0 40px rgba(0,0,0,0.9),
    inset 0 0 20px rgba(255,255,255,0.02);
}

/* ================= TITLE ================= */
.title{
  font-size:2.6rem;
  font-weight:700;
  margin-bottom:20px;
}

/* ================= STATUS ================= */
.status{
  font-size:0.9rem;
  color:#aaa;
  margin-bottom:10px;
}

.condition{
  font-size:1.1rem;
  font-weight:600;
  margin-bottom:8px;
  color:#e0e0e0;
}

.updated{
  font-size:0.75rem;
  color:#888;
  margin-bottom:12px;
}

.loading,.error{
  margin-top:20px;
  padding:16px;
  border-radius:12px;
  font-size:0.95rem;
}

.loading{
  background:rgba(255,255,255,0.05);
  color:#aaa;
}

.error{
  background:rgba(255,80,80,0.12);
  border:1px solid rgba(255,80,80,0.3);
  color:#ff9999;
}

/* ================= SEARCH ================= */
.search-box{
  position:relative;
  margin-bottom:20px;
}

#search{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:1px solid #333;
  background:#0f0f0f;
  color:#fff;
  outline:none;
  transition:.3s;
}

#search:focus{
  border-color:#666;
  box-shadow:0 0 10px rgba(255,255,255,0.1);
}

/* ================= SUGGESTIONS ================= */
.suggestions{
  position:absolute;
  width:100%;
  background:#0f0f0f;
  border-radius:10px;
  margin-top:5px;
  border:1px solid #333;
  max-height:200px;
  overflow-y:auto;
  display:none;
  z-index:10;
}

.suggestions div{
  padding:10px;
  cursor:pointer;
  transition:.3s;
}

.suggestions div:hover{
  background:#1a1a1a;
}

/* ================= WEATHER CARD ================= */
.weather-card{
  margin-top:20px;
  padding:25px;
  border-radius:15px;

  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);

  animation:fadeIn .6s ease;
}

/* ================= CITY ================= */
.city{
  font-size:1.5rem;
  margin-bottom:5px;
}

/* ================= TEMP ================= */
.main-temp{
  font-size:3rem;
  font-weight:bold;
  margin-bottom:15px;
  transition:0.4s;
}

/* 🌞 DAY TEMP EFFECT */
.day .main-temp{
  color:#ffd166;
  text-shadow:0 0 20px rgba(255,200,0,0.6);
}

/* 🌙 NIGHT TEMP EFFECT */
.night .main-temp{
  color:#7ec8ff;
  text-shadow:0 0 20px rgba(0,150,255,0.6);
}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

/* ================= ITEM ================= */
.item{
  padding:15px;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.08);
  transition:.3s;
}

.item:hover{
  transform:translateY(-5px) scale(1.03);
}

/* ================= VALUE ================= */
.value{
  font-size:1.3rem;
  font-weight:bold;
}

/* ================= LABEL ================= */
.label{
  font-size:.8rem;
  color:#aaa;
}

/* ================= ANIMATION ================= */
@keyframes fadeIn{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* ================= RESPONSIVE ================= */
@media(max-width:700px){
  .grid{
    grid-template-columns:1fr 1fr;
  }
}

@media(max-width:500px){
  .grid{
    grid-template-columns:1fr;
  }
}

</style>
</head>

<body class="night">

<div class="container">

  <div class="title">🌌 WeatherX Pro</div>

  <div class="search-box">
    <input id="search" placeholder="Search city...">
    <div id="suggestions" class="suggestions"></div>
  </div>

  <div id="loading" class="loading" style="display:none;">Loading live weather…</div>
  <div id="error" class="error" style="display:none;"></div>

  <div id="weather" class="weather-card" style="display:none;">

    <div id="city" class="city"></div>
    <div id="status" class="status"></div>
    <div id="condition" class="condition"></div>
    <div id="temp" class="main-temp"></div>
    <div id="updated" class="updated"></div>

    <div class="grid">

      <div class="item">
        <div id="humidity" class="value"></div>
        <div class="label">Humidity</div>
      </div>

      <div class="item">
        <div id="wind" class="value"></div>
        <div class="label">Wind Speed</div>
      </div>

      <div class="item">
        <div id="uv" class="value"></div>
        <div class="label">UV Index</div>
      </div>

      <div class="item">
        <div id="rain" class="value"></div>
        <div class="label">Rain</div>
      </div>

      <div class="item">
        <div id="visibility" class="value"></div>
        <div class="label">Visibility</div>
      </div>

      <div class="item">
        <div id="pressure" class="value"></div>
        <div class="label">Pressure</div>
      </div>

    </div>
  </div>

</div>

<script>

const search=document.getElementById("search");
const suggestions=document.getElementById("suggestions");
const weatherCard=document.getElementById("weather");
const loadingEl=document.getElementById("loading");
const errorEl=document.getElementById("error");

let activeCity=null;
let refreshTimer=null;
let searchTimer=null;
let searchAbort=null;

const WEATHER_CODES={
  0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",
  45:"Foggy",48:"Depositing rime fog",
  51:"Light drizzle",53:"Moderate drizzle",55:"Dense drizzle",
  61:"Slight rain",63:"Moderate rain",65:"Heavy rain",
  71:"Slight snow",73:"Moderate snow",75:"Heavy snow",
  80:"Rain showers",81:"Moderate rain showers",82:"Violent rain showers",
  95:"Thunderstorm",96:"Thunderstorm with hail",99:"Thunderstorm with heavy hail"
};

function weatherLabel(code){
  return WEATHER_CODES[code]||"Unknown";
}

function formatValue(value,unit,fallback="—"){
  return value!=null&&!Number.isNaN(value)?`${value}${unit}`:fallback;
}

function formatLocalTime(isoString,timezone){
  if(!isoString)return"";
  return new Intl.DateTimeFormat(undefined,{
    dateStyle:"medium",timeStyle:"short",timeZone:timezone
  }).format(new Date(isoString));
}

function showLoading(){
  loadingEl.style.display="block";
  errorEl.style.display="none";
}

function showError(msg){
  loadingEl.style.display="none";
  errorEl.style.display="block";
  errorEl.textContent=msg;
}

function hideMessages(){
  loadingEl.style.display="none";
  errorEl.style.display="none";
}

search.addEventListener("input",()=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(async()=>{
    const query=search.value.trim();

    if(query.length<2){
      suggestions.style.display="none";
      return;
    }

    if(searchAbort)searchAbort.abort();
    searchAbort=new AbortController();

    try{
      const res=await fetch(
        `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(query)}&count=5`,
        {signal:searchAbort.signal}
      );
      const data=await res.json();

      suggestions.innerHTML="";

      if(!data.results?.length){
        suggestions.style.display="none";
        return;
      }

      suggestions.style.display="block";

      data.results.forEach(city=>{
        const div=document.createElement("div");
        const label=[city.name,city.admin1,city.country].filter(Boolean).join(", ");
        div.textContent=label;

        div.onclick=()=>{
          search.value=city.name;
          suggestions.style.display="none";
          selectCity(city.latitude,city.longitude,label);
        };

        suggestions.appendChild(div);
      });
    }catch(err){
      if(err.name!=="AbortError")console.error(err);
    }
  },300);
});

function selectCity(lat,lon,name){
  activeCity={lat,lon,name};
  getWeather();
  clearInterval(refreshTimer);
  refreshTimer=setInterval(getWeather,10*60*1000);
}

async function getWeather(){
  if(!activeCity)return;

  const {lat,lon,name}=activeCity;
  showLoading();

  const params=new URLSearchParams({
    latitude:lat,
    longitude:lon,
    timezone:"auto",
    current:"temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,uv_index,visibility,rain,surface_pressure,is_day"
  });

  try{
    const res=await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
    if(!res.ok)throw new Error("Could not fetch weather data.");

    const data=await res.json();
    const current=data.current;

    if(!current){
      throw new Error("Weather data is unavailable for this location.");
    }

    hideMessages();
    weatherCard.style.display="block";

    const isDay=current.is_day===1;
    const body=document.body;
    const status=document.getElementById("status");

    if(isDay){
      body.classList.remove("night");
      body.classList.add("day");
      status.textContent="🌞 Day Time";
    }else{
      body.classList.remove("day");
      body.classList.add("night");
      status.textContent="🌙 Night Time";
    }

    document.getElementById("city").textContent=name;
    document.getElementById("condition").textContent=weatherLabel(current.weather_code);
    document.getElementById("temp").textContent=formatValue(Math.round(current.temperature_2m)," °C");
    document.getElementById("wind").textContent=formatValue(Math.round(current.wind_speed_10m)," km/h");
    document.getElementById("humidity").textContent=formatValue(Math.round(current.relative_humidity_2m)," %");
    document.getElementById("uv").textContent=formatValue(current.uv_index?.toFixed(1),"");
    document.getElementById("rain").textContent=formatValue(current.rain?.toFixed(1)," mm");
    document.getElementById("visibility").textContent=formatValue(Math.round(current.visibility)," m");
    document.getElementById("pressure").textContent=formatValue(Math.round(current.surface_pressure)," hPa");
    document.getElementById("updated").textContent=
      `Updated: ${formatLocalTime(current.time,data.timezone)} (${data.timezone})`;
  }catch(err){
    showError(err.message||"Something went wrong. Please try again.");
  }
}

</script>

</body>
</html>
